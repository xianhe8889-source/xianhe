<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>数据系统</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: 20px auto;
  background: #fafafa;
}

.header {
  position: sticky;
  top: 0;
  background: white;
  padding: 15px;
  border-bottom: 1px solid #ddd;
  z-index: 100;
}

button {
  padding: 10px 14px;
  margin-right: 10px;
  cursor: pointer;
  border-radius: 6px;
  border: 1px solid #ccc;
}

#dataBox {
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 8px;
  white-space: pre-wrap;
}

select {
  padding: 8px;
  margin-left: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h2>📊 数据系统</h2>

  <div>
    📅 今日日期：<span id="today"></span>
  </div>

  <div style="margin-top:10px;">
    <button onclick="copyAll()">📋 一键复制</button>

    <select id="history" onchange="loadHistory()">
      <option value="data.txt">今天数据</option>
      <option value="data_2026-01-01.txt">历史数据1</option>
      <option value="data_2026-01-02.txt">历史数据2</option>
    </select>
  </div>
</div>

<pre id="dataBox">加载中...</pre>

<script>
// 显示日期
document.getElementById("today").innerText =
  new Date().toLocaleDateString();

// 加载数据
function loadFile(file){
  fetch(file)
    .then(r => r.text())
    .then(t => {
      document.getElementById("dataBox").innerText = t;
    });
}

// 默认加载今天
loadFile("data.txt");

// 切换历史
function loadHistory(){
  const file = document.getElementById("history").value;
  loadFile(file);
}

// 一键复制
function copyAll(){
  const text = document.getElementById("dataBox").innerText;
  navigator.clipboard.writeText(text);
  alert("已复制全部数据");
}
</script>

</body>
</html>
